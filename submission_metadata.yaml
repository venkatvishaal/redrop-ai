ai_usage_summary: |
  Used Claude for architecture design review and code review .
  No candidate data was fed to any LLM during ranking.
  All scoring is deterministic and runs offline on CPU.

methodology_summary: |
  The system is a  deterministic two-stage multi-signal ranking engine with 5 scoring dimensions.
  Stage 1: Pool-stable TF-IDF cosine similarity between candidate full-text
  (headline + summary + career history + education) and JD embedding
  text (semantic_fit weight: 12%).

  Stage 2: Composite scoring across four additional dimensions:
  - Core Fit (45%): Trust-weighted skill coverage with career-text
    corroboration, plain-language matching for Tier-5 candidates,
    disclaim/hedge detection, and framework-enthusiast flagging.
  - Experience Fit (15%): Years vs JD band (5-9y), company-type
    scoring (product > consulting), seniority trajectory, evidence
    of operational ML work (embedding drift, index refresh, A/B).
  - Behavioral Fit (15%): Runtime-relative recency, response rate/speed, engagement,
    open-to-work/application intent, profile completeness, assessments and GitHub activity
    (profile views, saves, connections), reliability (interview
    completion, offer acceptance, verification status).
  - Location Logistics (13%): Preferred cities (Pune, Noida,
    Hyderabad), India preference, notice period fit.
  - Education Bonus (additive 0-0.03): Institution tier, field
    relevance, degree level, grade.

  Anti-gaming: 7 independent detection layers (trust-weighting,
  career-text corroboration, disclaim patterns, plain-language +
  anti-disqualify, framework-enthusiast flag, sanity checks,
  honeypot detection). 24,908 candidates hard-excluded.

  System adds an O(1000) evidence-consensus reranker, fairness invariance tests,
  controlled ablations, recruiter-feedback capture and labeled calibration tooling.


